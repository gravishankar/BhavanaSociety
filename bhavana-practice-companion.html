<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bhavana Practice Companion</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#6f5b2f" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f7f4ed; color: #25211b; }
    .wrap { max-width: 920px; margin: 0 auto; padding: 20px; }
    .card { background: #fffdf9; border: 1px solid #ddd6c8; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    h1, h2 { margin: 0 0 10px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
    label { font-size: 14px; color: #666055; }
    input, select { min-height: 38px; border: 1px solid #cfc7b6; border-radius: 8px; padding: 6px 10px; background: #fff; }
    button { min-height: 40px; border: 1px solid #9b8b63; background: #6f5b2f; color: #fff; padding: 8px 14px; border-radius: 999px; cursor: pointer; }
    button.secondary { background: #fff; color: #25211b; }
    .timer { font-size: 40px; margin: 8px 0; font-weight: 700; }
    .muted { color: #666055; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bhavana Practice Companion</h1>
    <p class="muted">Sitting then walking guidance, with long silence and gentle reminders.</p>

    <section class="card">
      <h2>Session</h2>
      <div class="row">
        <label for="sessionType">Type</label>
        <select id="sessionType">
          <option value="sitting">Sitting</option>
          <option value="walking">Walking</option>
          <option value="combo">Sitting then Walking</option>
        </select>

        <label for="sessionMins">Length</label>
        <select id="sessionMins">
          <option value="10">10 min</option>
          <option value="20" selected>20 min</option>
          <option value="30">30 min</option>
        </select>
      </div>

      <div class="row">
        <button onclick="beginSession()">Begin</button>
        <button class="secondary" onclick="togglePause()">Pause/Resume</button>
        <button class="secondary" onclick="resetSession()">Reset</button>
      </div>
      <div id="timerDisplay" class="timer">00:00</div>
      <div id="status" class="muted">Ready.</div>
    </section>

    <section class="card">
      <h2>Personal Preferences</h2>
      <div class="row">
        <label for="chimeCount">Opening chimes</label>
        <select id="chimeCount">
          <option value="1" selected>1 chime</option>
          <option value="3">3 chimes</option>
        </select>
        <label for="reminderMins">Voice reminder every</label>
        <select id="reminderMins">
          <option value="0">No reminders</option>
          <option value="3">3 min</option>
          <option value="5" selected>5 min</option>
          <option value="10">10 min</option>
        </select>
        <label><input id="closingVerse" type="checkbox" checked /> Closing verse</label>
      </div>
      <div class="row">
        <label for="bellVolume">Bell volume</label><input id="bellVolume" type="range" min="0" max="100" value="48" />
        <label for="voiceVolume">Voice volume</label><input id="voiceVolume" type="range" min="0" max="100" value="80" />
        <label for="silencePad">Silence padding (s)</label><input id="silencePad" type="number" min="0" max="20" value="4" />
      </div>
      <div class="row">
        <button class="secondary" onclick="savePrefs()">Save preferences</button>
        <button class="secondary" onclick="window.location.href='./audio-pack.zip'">Download audio pack</button>
      </div>
    </section>
  </div>

  <script>
    const PREF_KEY = "bhavana_prefs_v1";
    const audioBase = "./audio/";
    const scripts = {
      sitting: ["sitting_intro_01.mp3","sitting_intro_02.mp3","sitting_intro_03.mp3","sitting_intro_04.mp3","sitting_intro_05.mp3","sitting_intro_06.mp3"],
      walking: ["walking_intro_01.mp3","walking_intro_02.mp3","walking_intro_03.mp3","walking_intro_04.mp3","walking_intro_05.mp3","walking_intro_06.mp3"]
    };

    let ctx = null;
    let timerId = null;
    let seconds = 0;
    let running = false;
    let reminderId = null;

    function getPrefs() {
      const raw = localStorage.getItem(PREF_KEY);
      if (!raw) return { chimeCount: 1, reminderMins: 5, bellVolume: 48, voiceVolume: 80, silencePad: 4, closingVerse: true };
      return JSON.parse(raw);
    }

    function savePrefs() {
      const prefs = {
        chimeCount: parseInt(document.getElementById("chimeCount").value, 10),
        reminderMins: parseInt(document.getElementById("reminderMins").value, 10),
        bellVolume: parseInt(document.getElementById("bellVolume").value, 10),
        voiceVolume: parseInt(document.getElementById("voiceVolume").value, 10),
        silencePad: parseInt(document.getElementById("silencePad").value, 10),
        closingVerse: document.getElementById("closingVerse").checked
      };
      localStorage.setItem(PREF_KEY, JSON.stringify(prefs));
      setStatus("Preferences saved.");
    }

    function loadPrefsUI() {
      const p = getPrefs();
      document.getElementById("chimeCount").value = String(p.chimeCount);
      document.getElementById("reminderMins").value = String(p.reminderMins);
      document.getElementById("bellVolume").value = String(p.bellVolume);
      document.getElementById("voiceVolume").value = String(p.voiceVolume);
      document.getElementById("silencePad").value = String(p.silencePad);
      document.getElementById("closingVerse").checked = !!p.closingVerse;
    }

    function setStatus(msg) { document.getElementById("status").textContent = msg; }
    function formatTime(sec) { return String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0"); }
    function renderTimer() { document.getElementById("timerDisplay").textContent = formatTime(seconds); }

    async function playAudioFile(filename) {
      const prefs = getPrefs();
      const audio = new Audio(audioBase + filename);
      audio.volume = prefs.voiceVolume / 100;
      try { await audio.play(); } catch (_) {}
      await new Promise((resolve) => { audio.onended = resolve; audio.onerror = resolve; });
      await new Promise((resolve) => setTimeout(resolve, prefs.silencePad * 1000));
    }

    function ensureCtx() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === "suspended") ctx.resume().catch(() => {});
    }

    function playChimeAt(t0, isEnd) {
      const prefs = getPrefs();
      const master = ((prefs.bellVolume / 100) * (isEnd ? 0.35 : 0.2));
      const partials = isEnd
        ? [{f:392,d:6.2,w:1},{f:784,d:4.6,w:0.32},{f:1176,d:3.1,w:0.1}]
        : [{f:392,d:2.6,w:1},{f:784,d:1.8,w:0.28},{f:1176,d:1.2,w:0.08}];
      partials.forEach((p) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(p.f, t0);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(Math.max(0.002, master * p.w), t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + p.d);
        o.connect(g); g.connect(ctx.destination); o.start(t0); o.stop(t0 + p.d + 0.05);
      });
    }

    function playOpeningChimes() {
      ensureCtx();
      const prefs = getPrefs();
      const now = ctx.currentTime;
      const count = prefs.chimeCount === 3 ? 3 : 1;
      for (let i = 0; i < count; i++) playChimeAt(now + i * 2.2, false);
    }

    function playClosingChime() { ensureCtx(); playChimeAt(ctx.currentTime, true); }

    async function playIntro(type) {
      const seq = type === "combo" ? [...scripts.sitting, ...scripts.walking] : scripts[type];
      for (const file of seq) {
        if (!running) return;
        await playAudioFile(file);
      }
    }

    function startReminderLoop(type) {
      const prefs = getPrefs();
      const mins = prefs.reminderMins;
      if (!mins) return;
      clearInterval(reminderId);
      reminderId = setInterval(() => {
        if (!running) return;
        const file = type === "walking" ? "reminder_walk_01.mp3" : "reminder_breath_01.mp3";
        playAudioFile(file);
      }, mins * 60 * 1000);
    }

    function stopAll() {
      running = false;
      clearInterval(timerId);
      clearInterval(reminderId);
      timerId = null;
      reminderId = null;
    }

    async function beginSession() {
      stopAll();
      savePrefs();
      const type = document.getElementById("sessionType").value;
      seconds = parseInt(document.getElementById("sessionMins").value, 10) * 60;
      renderTimer();
      running = true;
      setStatus("Starting session...");
      playOpeningChimes();
      startReminderLoop(type);
      playIntro(type);
      timerId = setInterval(async () => {
        if (!running) return;
        seconds -= 1;
        renderTimer();
        if (seconds <= 0) {
          stopAll();
          playClosingChime();
          if (getPrefs().closingVerse) await playAudioFile("closing_01.mp3");
          setStatus("Session complete.");
        }
      }, 1000);
      setStatus("Practice underway. Guidance at beginning, then silence.");
    }

    function togglePause() {
      if (!timerId) return;
      running = !running;
      setStatus(running ? "Resumed." : "Paused.");
    }

    function resetSession() {
      stopAll();
      seconds = 0;
      renderTimer();
      setStatus("Reset.");
    }

    loadPrefsUI();
    renderTimer();
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
